<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ t('places.brand') }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="lang-switcher">
    {% for lang in supported_langs %}
    <form method="POST" action="{{ url_for('set_lang') }}" style="display:inline">
      <input type="hidden" name="lang" value="{{ lang.code }}">
      <input type="hidden" name="next" value="{{ request.path }}">
      <button type="submit" class="lang-btn{% if lang.code == current_lang %} lang-btn--active{% endif %}">{{ lang.label }}</button>
    </form>
    {% if not loop.last %}<span class="lang-sep">|</span>{% endif %}
    {% endfor %}
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash--{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

</body>
</html>
