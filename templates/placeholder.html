<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t(module_key) }} — {{ t('home.title') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .ph-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 40px 16px; text-align: center;
    }
    .ph-title { font-size: 24px; font-weight: 700; color: var(--text); }
    .ph-note  { font-size: 14px; color: var(--text2); }
  </style>
</head>
<body>

<div class="lang-switcher">
  {% for lang in supported_langs %}
  <form method="POST" action="{{ url_for('set_lang') }}" style="display:inline">
    <input type="hidden" name="lang" value="{{ lang.code }}">
    <input type="hidden" name="next" value="{{ request.path }}">
    <button type="submit" class="lang-btn{% if lang.code == current_lang %} lang-btn--active{% endif %}">{{ lang.label }}</button>
  </form>
  {% if not loop.last %}<span class="lang-sep">|</span>{% endif %}
  {% endfor %}
</div>

<div class="ph-wrap">
  <h1 class="ph-title">{{ t(module_key) }}</h1>
  <p class="ph-note">{{ t('placeholder.body') }}</p>
  <a href="{{ url_for('home') }}" class="btn btn--ghost">{{ t('placeholder.back') }}</a>
</div>
</body>
</html>
