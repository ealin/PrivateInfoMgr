<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('home.title') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .home-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 40px; padding: 40px 16px;
    }
    .home-title {
      font-size: 26px; font-weight: 700;
      color: var(--text); letter-spacing: .03em; text-align: center;
    }
    .home-subtitle {
      font-size: 13px; color: var(--text2); margin-top: 6px; text-align: center;
    }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; width: min(720px, 92vw);
    }
    .module-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 32px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      text-decoration: none; color: var(--text);
      transition: border-color .18s, background .18s, transform .15s;
      cursor: pointer;
    }
    .module-card:hover {
      border-color: var(--accent); background: var(--accent-dim);
      transform: translateY(-2px);
    }
    .module-icon {
      width: 48px; height: 48px; color: var(--accent);
    }
    .module-name {
      font-size: 16px; font-weight: 600; text-align: center;
    }
    .module-card--placeholder {
      opacity: .6;
    }
    .module-card--placeholder:hover {
      border-color: var(--border); background: var(--card);
      transform: none; cursor: default;
    }
    .module-badge {
      font-size: 11px; color: var(--text3);
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 10px;
    }
  </style>
</head>
<body>

<div class="lang-switcher">
  {% for lang in supported_langs %}
  <form method="POST" action="{{ url_for('set_lang') }}" style="display:inline">
    <input type="hidden" name="lang" value="{{ lang.code }}">
    <input type="hidden" name="next" value="{{ request.path }}">
    <button type="submit" class="lang-btn{% if lang.code == current_lang %} lang-btn--active{% endif %}">{{ lang.label }}</button>
  </form>
  {% if not loop.last %}<span class="lang-sep">|</span>{% endif %}
  {% endfor %}
</div>

<div class="home-wrap">
  <div>
    <h1 class="home-title">{{ t('home.title') }}</h1>
    <p class="home-subtitle">{{ t('home.subtitle') }}</p>
  </div>

  <div class="module-grid">

    <a href="{{ url_for('pwd.index') }}" class="module-card">
      <svg class="module-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1" fill="currentColor" stroke="none"/>
      </svg>
      <span class="module-name">{{ t('module.pwd') }}</span>
    </a>

    <a href="{{ url_for('places') }}" class="module-card module-card--placeholder">
      <svg class="module-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <span class="module-name">{{ t('module.places') }}</span>
      <span class="module-badge">{{ t('home.coming_soon') }}</span>
    </a>

    <a href="{{ url_for('bucket_list') }}" class="module-card module-card--placeholder">
      <svg class="module-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <polyline points="3 6 4 7 6 5"/>
        <polyline points="3 12 4 13 6 11"/>
        <polyline points="3 18 4 19 6 17"/>
      </svg>
      <span class="module-name">{{ t('module.bucket_list') }}</span>
      <span class="module-badge">{{ t('home.coming_soon') }}</span>
    </a>

  </div>
</div>
</body>
</html>
